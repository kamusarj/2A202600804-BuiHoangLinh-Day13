alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95_ms > 2000 for 1m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
    test_scenario: rag_slow
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 5 for 1m
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
    test_scenario: tool_fail
  - name: cost_budget_spike
    severity: P2
    condition: hourly_cost_usd > 0.05 for 1m
    type: symptom-based
    owner: finops-owner
    runbook: docs/alerts.md#3-cost-budget-spike
    test_scenario: cost_spike
